services:
  scomp:
    build: .
    env_file:
      - .env
    volumes:
      - ./browser_profiles:/app/browser_profiles  # Outlook session state
      - ./logs:/app/logs                          # Rotating log files
      - ./db:/app/db                              # SQLite database
      - ./config:/app/config                      # YAML configs (edit without rebuild)
    stdin_open: true
    tty: true
    restart: "no"
